services:
  minio:
    image: minio/minio:latest
    container_name: toatoa-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio-data:/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toatoa-app
    depends_on:
      - minio
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "DataSource=Data/app.db;Cache=Shared"
      ConnectionStrings__CatalogoConnection: "DataSource=Data/catalogo.db;Cache=Shared"
      # App -> MinIO é interno (rede do compose); o navegador acessa via PublicBaseUrl.
      Minio__Endpoint: "minio:9000"
      Minio__PublicBaseUrl: "http://localhost:9000"   # troque pelo host/domínio público ao hospedar
      Minio__AccessKey: "minioadmin"
      Minio__SecretKey: "minioadmin"
      Minio__Bucket: "toatoa-vestidos"
      Minio__UseSSL: "false"
    ports:
      - "5099:8080"   # loja: http://localhost:5099
    volumes:
      - toatoa-data:/app/Data   # persiste os bancos SQLite
    restart: unless-stopped

volumes:
  minio-data:
  toatoa-data:
