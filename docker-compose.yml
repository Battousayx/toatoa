services:
  minio:
    image: minio/minio:latest
    container_name: toatoa-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_PASSWORD:-minioadmin}"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio-data:/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toatoa-app
    depends_on:
      - minio
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "DataSource=Data/app.db;Cache=Shared"
      ConnectionStrings__CatalogoConnection: "DataSource=Data/catalogo.db;Cache=Shared"
      # App -> MinIO é interno (rede do compose); o navegador acessa via PublicBaseUrl.
      Minio__Endpoint: "minio:9000"
      # PUBLIC_HOST = IP público ou domínio da VM (definido no .env). Default: localhost.
      Minio__PublicBaseUrl: "http://${PUBLIC_HOST:-localhost}:9000"
      Minio__AccessKey: "${MINIO_USER:-minioadmin}"
      Minio__SecretKey: "${MINIO_PASSWORD:-minioadmin}"
      Minio__Bucket: "toatoa-vestidos"
      Minio__UseSSL: "false"
    ports:
      - "${APP_PORT:-80}:8080"   # loja: http://<host> (porta 80)
    volumes:
      - toatoa-data:/app/Data   # persiste os bancos SQLite
    restart: unless-stopped

volumes:
  minio-data:
  toatoa-data:
